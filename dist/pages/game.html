<style data-page="game">* {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
    }

    /* 顶部导航 */
    .nav-header {
        border: 2px solid black;
        padding: 5px;
        margin-bottom: 20px;
        background-color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: calc(100% - 40px);
        position: fixed;
        z-index: 10;
        top: 100px;

    }

    .nav-header h1 {
        font-size: 24px;
    }

    .back-btn {
        color: black;
        text-decoration: none;
        cursor: pointer;
        font-size: 16px;
    }



    .books {
        margin-top: 62px;
        border-top: 2px solid black;
    }

    .book {
        border: 2px solid black;
        padding: 5px;
        border-top: none;
        display: flex;
        position: relative;

    }

    .book-img {
        flex: 0 0 100px;
    }

    .book-img img {
        width: 100%;
        height: auto;
        display: block;

    }

    .book-description {
        flex: 1;
        margin-left: 15px;
        display: flex;
        flex-direction: column;
    }



    .book-btn {
        display: flex;
        gap: 10px;
        position: absolute;
        bottom: 10px;
    }

    .book-btn>div {
        border: 2px solid black;
        cursor: pointer;

    }

    .book-btn>div:hover {
        background-color: black;
        color: white;
    }

    .book-btn .want.active {
        background-color: Black;
        color: white;

    }

    .book-btn .read.active {
        background-color: Black;
        color: white;

    }

    /* Modal 样式 */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .modal.show {
        display: flex;
    }

    .modal-content {
        background-color: white;
        border: 2px solid black;
        padding: 20px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid black;
    }

    .modal-header h2 {
        font-size: 20px;
    }

    .close-btn {
        cursor: pointer;
        font-size: 24px;
        border: none;
        background: none;
        padding: 0;
    }

    .note-form {
        margin-bottom: 20px;
    }

    .note-form textarea {
        width: 100%;
        min-height: 120px;
        padding: 10px;
        border: 2px solid black;
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
    }

    .note-form button {
        margin-top: 10px;
        padding: 8px 20px;
        border: 2px solid black;
        background-color: white;
        cursor: pointer;
        font-size: 14px;
    }

    .note-form button:hover {
        background-color: black;
        color: white;
    }

    .notes-list {
        margin-top: 20px;
    }

    .note-item {
        border: 2px solid black;
        padding: 15px;
        margin-bottom: 10px;
        font-size: 14px;
    }

    .note-content {
        margin-bottom: 10px;
        line-height: 1.6;
        white-space: pre-wrap;
        font-size: 14px; 
    }

    .note-meta {
        font-size: 12px;
        color: #666;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .note-delete {
        cursor: pointer;

        font-size: 12px;
    }

    .note-delete:hover {
        text-decoration: underline;
    }
    .note-print:hover {
        text-decoration: underline;
    }
    .loading {
        text-align: center;
        padding: 20px;
        color: #666;
    }

    .empty-notes {
        text-align: center;
        padding: 40px;
        color: #999;
    }

    .note-form textarea:focus,
    .note-form input:focus {
        outline: none;
        border: 2px solid black;
    }


    /* 在 .book 样式后添加 */
    .book-notes-area {
        display: none;
        border: 2px solid black;
        padding: 15px;
        border-top: none;
    }

    .book-notes-area.show {
        display: block;
    }

    .notes-navigation {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;


    }

    .nav-arrow {
        cursor: pointer;
        padding: 5px 15px;
        border: 2px solid black;
        background-color: white;
        font-size: 18px;
    }

    .nav-arrow:hover {
        background-color: black;
        color: white;
    }

    .nav-arrow.disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }



    .current-note {
        padding: 15px;
        border: 2px solid black;
        background-color: white;
        min-height: 100px;
    }

    .current-note-content {
        margin-bottom: 10px;
        line-height: 1.6;
        white-space: pre-wrap;
 
    }

    .current-note-meta {
        font-size: 12px;
        color: #666;
    }

/* 在CSS末尾添加注解样式 */


    @media(max-width:600px) {
        .nav-header {
            margin-top: -20px;
            width: calc(100% - 20px);
        }

        .books {
            margin-top: 54px;
        }

        .books {
            font-size: 16px;
        }

        .book-btn {
            display: flex;
            gap: 5px;
            position: absolute;
            bottom: 10px;
        }

        .book-description {
            flex: 1;
            margin-left: 10px;
            display: flex;
            flex-direction: column;
        }

    }</style><link href="/css/styles.b5df29d146206732e48f.css" rel="stylesheet"><body><div class="container"><div class="nav-header"><h1>GAME</h1><a data-page="print" class="back-btn">← BACK TO LIBRARY</a></div><div class="books" id="booksContainer"></div></div><div class="modal" id="noteModal"><div class="modal-content"><div class="modal-header"><h2 id="modalBookTitle">Book Notes</h2><button class="close-btn" onclick="closeNoteModal()">×</button></div><div class="note-form"><div style="display: flex; gap: 10px; margin-bottom: 10px;"><input type="number" id="pageStart" placeholder="Start Page" style="width: 100px; padding: 5px; border: 2px solid black;" oninput="this.style.borderColor='black'"> <span style="line-height: 30px;">-</span> <input type="number" id="pageEnd" placeholder="End Page" style="width: 100px; padding: 5px; border: 2px solid black;"></div><textarea id="noteContent" placeholder="Write your note here..."></textarea> <button onclick="saveNote()">Add Note</button></div><div class="notes-list" id="notesList"><div class="loading">Loading notes...</div></div></div></div><script src="lib/library.js"></script><script>window.BookPage.init({ category: 'game' });</script><script defer="defer" src="/js/vendors.515c171d2c3970a6f856.js"></script><script defer="defer" src="/js/styles.42c0758976f42d12a89f.js"></script><script defer="defer" src="/js/global.a4917b0b0ac2c49697e8.js"></script></body>
