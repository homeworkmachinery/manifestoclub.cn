            function syncPanelHeights() {
    const leftPanel = document.querySelector('.ground-panel-left');
    const rightPanel = document.querySelector('.ground-panel-right');
    
    if (!leftPanel || !rightPanel) return;
    
    // 获取右侧面板的实际高度
    const rightHeight = rightPanel.offsetHeight;
    
    // 设置左侧面板高度与右侧相同
    leftPanel.style.height = rightHeight + 'px';
    
    console.log('左侧面板高度已设置为:', rightHeight, 'px');
}

            function renderGameSelector(product, productId) {
                // 只为产品5添加游戏选择器
                if (productId !== '001' || !product.variants) {
                    return;
                }

                const existingSelector = document.querySelector('.game-options');

                    existingSelector.remove();
                }

                const stockInfo = document.querySelector('.stock-info');
                if (stockInfo) {
                    const selectorHTML = `
            <div class="game-options">
                ${Object.entries(product.variants).map(([key, variant]) => `
                    <div class="game-option" data-variant="${key}">
                        <div class="game-name">${variant.name}</div>
                        <div class="game-desc">${variant.description}</div>
                    </div>
                `).join('')}
            </div>
        `;

                    stockInfo.insertAdjacentHTML('beforebegin', selectorHTML);
                    bindGameSelectionEvents(product);
                }
            }


            // 3. 添加游戏选择事件处理
            function bindGameSelectionEvents(product) {
                const mainImage = document.getElementById('mainImage');
                const gameOptions = document.querySelectorAll('.game-option');

                // 创建事件处理器（避免闭包问题）
                const handleGameClick = (e) => {
                    const option = e.currentTarget;
                    const variantKey = option.dataset.variant;
                    const variant = product.variants[variantKey];

                    if (!variant) return;

                    // 更新选中状态
                    gameOptions.forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');

                    // 更新主图
                    if (mainImage && variant.image) {
                        mainImage.src = variant.image;
                        mainImage.alt = variant.name;
                    }

                    // 保存选中的变体
                    window.currentProduct.selectedVariant = {
                        key: variantKey,
                        ...variant
                    };

                    console.log('选中游戏:', variant.name);
                };

                // 绑定事件
                gameOptions.forEach((option, index) => {
                    option.addEventListener('click', handleGameClick);
                    // 默认选中第一个
                    if (index === 0) {
                        option.click();
                    }
                });
            }

let currentSlideIndex = 0;
let slideImages = [];

function renderCarousel(product) {
    const wrapper = document.getElementById('carouselWrapper');
    if (!wrapper) return;

    wrapper.innerHTML = ''; // 清空旧内容
    currentSlideIndex = 0;
    slideImages = [];

    // --- 逻辑核心：决定使用哪些图片 ---
    // 优先查找 galleryFolder (轮播图专用)
    if (product.galleryFolder && product.galleryImages && product.galleryImages.length > 0) {
        // 拼接路径：文件夹 + 文件名
        slideImages = product.galleryImages.map(file => `${product.galleryFolder}/${file}`);
    } 
    // 后备方案：如果没有配置 gallery，则使用原来的 mainImage
    else {
        const defaultImg = product.mainImage || `/images/merch/${product.id}.jpg`;
        slideImages = [defaultImg];
    }

    // --- 构建 HTML ---
    const container = document.createElement('div');
    container.className = 'carousel-container';

    let slidesHtml = '';

    
    slideImages.forEach((src, index) => {
        const isActive = index === 0 ? 'active' : '';
        // 给第一张图加上 id="mainImage"，保证你原有的高度同步代码(syncPanelHeights)能找到它
        const idAttr = index === 0 ? 'id="mainImage"' : '';
        
        slidesHtml += `
            <div class="carousel-slide ${isActive}" data-index="${index}">
                <img src="${src}" ${idAttr} alt="Slide ${index}">
            </div>
        `;
    });

    // 只有当图片大于1张时，才显示导航按钮
    let controlsHtml = '';
    if (slideImages.length > 1) {
        controlsHtml = `
            <button class="carousel-btn prev-btn">❮</button>
            <button class="carousel-btn next-btn">❯</button>
            <div class="carousel-indicators">
                ${slideImages.map((_, idx) => 
                    `<div class="indicator ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>`
                ).join('')}
            </div>
        `;
    }

    container.innerHTML = slidesHtml + controlsHtml;
    wrapper.appendChild(container);

    // --- 绑定事件 ---
    if (slideImages.length > 1) {
        // 按钮点击
        container.querySelector('.prev-btn').addEventListener('click', () => moveSlide(-1));
        container.querySelector('.next-btn').addEventListener('click', () => moveSlide(1));
        
        // 指示点点击
        container.querySelectorAll('.indicator').forEach(dot => {
            dot.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.index);
                goToSlide(idx);
            });
        });
    }

    // --- 关键：触发图片加载后的高度同步 ---
    const mainImgEl = document.getElementById('mainImage');
    if (mainImgEl) {
        mainImgEl.onload = function() {
            // 调用你原有的同步高度函数
            if (typeof syncPanelHeights === 'function') {
                syncPanelHeights();
            }
        };
    }
}

// 切换逻辑
function moveSlide(step) {
    let newIndex = currentSlideIndex + step;
    if (newIndex >= slideImages.length) newIndex = 0;
    if (newIndex < 0) newIndex = slideImages.length - 1;
    goToSlide(newIndex);
}

function goToSlide(index) {
    const slides = document.querySelectorAll('.carousel-slide');
    const dots = document.querySelectorAll('.indicator');
    
    if (!slides.length) return;

    // 移除旧状态
    slides[currentSlideIndex].classList.remove('active');
    if (dots.length) dots[currentSlideIndex].classList.remove('active');

    // 更新索引
    currentSlideIndex = index;

    // 添加新状态
    slides[currentSlideIndex].classList.add('active');
    if (dots.length) dots[currentSlideIndex].classList.add('active');
}

            // 添加到购物车处理函数
async function handleAddToCart() {
    const addBtn = document.getElementById('addToCartBtn');
    if (!addBtn) return;
    
    // 保存原始按钮状态
    const originalText = addBtn.textContent;
    const originalBg = addBtn.style.backgroundColor || 'black';
    
    try {
        if (!window.currentProduct) {
            alert('产品信息未加载');
            restoreButtonState(addBtn, originalText, originalBg);
            return;
        }

        const product = window.currentProduct;
        console.log('Adding console product to cart:', product.name);

        // 显示"添加中"状态
        addBtn.textContent = 'ADDING...';
        addBtn.style.backgroundColor = '#666'; // 灰色表示处理中
        addBtn.disabled = true;

        // 检查用户登录状态
        const user = await checkUserLogin();
        if (!user) {
            restoreButtonState(addBtn, originalText, originalBg);
            return;
        }

        // 准备商品数据
        const priceNumber = parseFloat(product.price.replace(/[^0-9.]/g, ''));

        // 准备变体信息
        const selectedVariant = window.currentProduct.selectedVariant;
        const variantSuffix = selectedVariant ? `-${selectedVariant.key}` : '';
        const variantName = selectedVariant ? ` - ${selectedVariant.name}` : '';

        const cartItemData = {
            user_id: user.id,
            draft_id: null,
            type: `console-${product.id}${variantSuffix}`,
            quantity: 1,
            sizes: { 'default': 1 },
            price: priceNumber,
            total_price: priceNumber,
            item_data: {
                productId: product.id,
                productName: product.name + variantName,
                productDes: product.des,
                productCategory: product.category,
                productImage: selectedVariant?.image || product.mainImage || `/images/merch/${product.id}.jpg`,
                productType: 'retro-console',
                variantKey: selectedVariant?.key,
                variantName: selectedVariant?.name,
                variantDescription: selectedVariant?.description
            },
            added_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
        };

        console.log('📤 发送到后端的完整数据:', JSON.stringify(cartItemData, null, 2));

        // 调用后端 API
        const API_BASE_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:3001'
            : '';

        // 获取 token
        let token;
        if (window.authManager && window.authManager.getToken) {
            token = window.authManager.getToken();
        }

        if (!token && window.supabase) {
            const { data: { session } } = await supabase.auth.getSession();
            token = session?.access_token;
        }

        if (!token) {
            alert('未登录，请先登录');
            restoreButtonState(addBtn, originalText, originalBg);
            return;
        }

        // 尝试调用主 API
        try {
            const response = await fetch(`${API_BASE_URL}/api/cart/add`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    cartItemData
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({ error: '未知错误' }));
                console.error('❌ API 错误:', errorData);
                alert('添加失败：' + (errorData.error || '未知错误'));
                restoreButtonState(addBtn, originalText, originalBg);
                return;
            }

            const result = await response.json();
            console.log('✅ API 响应:', result);

            // 显示成功状态（✓ ADDED TO CART）
            showButtonSuccess(addBtn, originalText);

            // 更新购物车徽章
            if (window.CartManager && window.CartManager.updateCartBadge) {
                await window.CartManager.updateCartBadge();
            }

        } catch (error) {
            console.error('❌ API 调用失败:', error);

         
                restoreButtonState(addBtn, originalText, originalBg);
              
            
            console.log('使用备用方案：直接调用 Supabase...');

            // 备用方案：直接使用 Supabase
            try {
                // 先检查购物车中是否已有此产品
                const { data: existingItems, error: fetchError } = await supabase
                    .from('cart_items')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('type', cartItemData.type);

                if (fetchError) {
                    console.error('Error checking existing items:', fetchError);
                    alert('查询购物车失败');
                    restoreButtonState(addBtn, originalText, originalBg);
                    return;
                }

                if (existingItems && existingItems.length > 0) {
                    // 产品已存在，更新数量
                    const existingItem = existingItems[0];
                    const currentQty = existingItem.quantity || 1;
                    const newQty = currentQty + 1;

                    const { data, error } = await supabase
                        .from('cart_items')
                        .update({
                            quantity: newQty,
                            total_price: priceNumber * newQty,
                            sizes: { 'default': newQty },
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', existingItem.id)
                        .select()
                        .single();

                    if (error) {
                        console.error('Update error:', error);
                        alert('更新失败');
                        restoreButtonState(addBtn, originalText, originalBg);
                        return;
                    }

                    console.log('Updated existing item:', data);
                    showButtonSuccess(addBtn, originalText);

                } else {
                    // 添加新产品到购物车
                    const { data, error } = await supabase
                        .from('cart_items')
                        .insert(cartItemData)
                        .select()
                        .single();

                    if (error) {
                        console.error('Insert error:', error);

                        // 如果 item_data 字段不存在，尝试不包含它
                        if (error.message && error.message.includes('item_data')) {
                            console.log('Retrying without item_data field...');
                            delete cartItemData.item_data;

                            const { data: retryData, error: retryError } = await supabase
                                .from('cart_items')
                                .insert(cartItemData)
                                .select()
                                .single();

                            if (retryError) {
                                alert('添加失败：' + retryError.message);
                                restoreButtonState(addBtn, originalText, originalBg);
                                return;
                            }

                            console.log('Added to cart (without item_data):', retryData);
                        } else {
                            alert('添加失败：' + error.message);
                            restoreButtonState(addBtn, originalText, originalBg);
                            return;
                        }
                    } else {
                        console.log('Added to cart:', data);
                    }

                    showButtonSuccess(addBtn, originalText);
                }

                // 更新购物车徽章
                if (window.CartManager && window.CartManager.updateCartBadge) {
                    await window.CartManager.updateCartBadge();
                }

            } catch (fallbackError) {
                console.error('备用方案失败:', fallbackError);
                alert('操作失败，请重试');
                restoreButtonState(addBtn, originalText, originalBg);
            }
        }

    } catch (error) {
        console.error('Add to cart failed:', error);
        alert('操作失败，请重试');
        restoreButtonState(addBtn, originalText, originalBg);
    }
}

// 辅助函数：恢复按钮状态
function restoreButtonState(button, originalText, originalBg) {
    if (!button) return;
    button.textContent = originalText;
    button.style.backgroundColor = originalBg;
    button.disabled = false;
}

// 辅助函数：显示成功状态
function showButtonSuccess(button, originalText) {
    if (!button) return;
    
    // 设置成功状态
    button.textContent = '✓ ADDED TO CART';
    button.style.backgroundColor = 'black';
    button.disabled = true;
    
    // 触发购物车更新效果
    if (window.CartManager) {
        if (window.CartManager.showCartAddedEffect) {
            window.CartManager.showCartAddedEffect();
        }
        if (window.CartManager.updateCartCount) {
            window.CartManager.updateCartCount();
        }
    }
    
    // 延迟后恢复原状
    setTimeout(() => {
        restoreButtonState(button, originalText, 'black');
    }, 2000);
}
