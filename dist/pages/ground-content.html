            function syncPanelHeights() {
    const leftPanel = document.querySelector('.ground-panel-left');
    const rightPanel = document.querySelector('.ground-panel-right');
    
    if (!leftPanel || !rightPanel) return;
    
    // 获取右侧面板的实际高度
    const rightHeight = rightPanel.offsetHeight;
    
    // 设置左侧面板高度与右侧相同
    leftPanel.style.height = rightHeight + 'px';
    
    console.log('左侧面板高度已设置为:', rightHeight, 'px');
}

// 在图片加载后重新计算高度
function handleImageLoad() {
    setTimeout(syncPanelHeights, 100); // 延迟确保DOM已更新
}

// 在页面加载后调整图片容器高度
window.addEventListener('load', function() {
    syncPanelHeights();
    // 添加图片加载监听
    const mainImage = document.getElementById('mainImage');
    if (mainImage) {
        mainImage.addEventListener('load', handleImageLoad);
    }
});

// DOM 加载完成后执行
document.addEventListener('DOMContentLoaded', function() {
    // 初始同步
    setTimeout(syncPanelHeights, 500);
    
    // 监听窗口大小变化
    window.addEventListener('resize', syncPanelHeights);
    
    // 监听游戏选择器的点击（如果你的页面有）
    const gameOptions = document.querySelectorAll('.game-option');
    if (gameOptions.length > 0) {
        gameOptions.forEach(option => {
            option.addEventListener('click', function() {
                // 图片切换后重新计算高度
                setTimeout(syncPanelHeights, 300);
            });
        });
    }
});

            function renderGameSelector(product, productId) {
                // 只为产品5添加游戏选择器
                if (productId !== '001' || !product.variants) {
                    return;
                }

                const existingSelector = document.querySelector('.game-options');
                if (existingSelector) {
                    existingSelector.remove();
                }

                const stockInfo = document.querySelector('.stock-info');
                if (stockInfo) {
                    const selectorHTML = `
            <div class="game-options">
                ${Object.entries(product.variants).map(([key, variant]) => `
                    <div class="game-option" data-variant="${key}">
                        <div class="game-name">${variant.name}</div>
                        <div class="game-desc">${variant.description}</div>
                    </div>
                `).join('')}
            </div>
        `;

                    stockInfo.insertAdjacentHTML('beforebegin', selectorHTML);
                    bindGameSelectionEvents(product);
                }
            }


            // 3. 添加游戏选择事件处理
            function bindGameSelectionEvents(product) {
                const mainImage = document.getElementById('mainImage');
                const gameOptions = document.querySelectorAll('.game-option');

                // 创建事件处理器（避免闭包问题）
                const handleGameClick = (e) => {
                    const option = e.currentTarget;
                    const variantKey = option.dataset.variant;
                    const variant = product.variants[variantKey];

                    if (!variant) return;

                    // 更新选中状态
                    gameOptions.forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');

                    // 更新主图
                    if (mainImage && variant.image) {
                        mainImage.src = variant.image;
                        mainImage.alt = variant.name;
                    }

                    // 保存选中的变体
                    window.currentProduct.selectedVariant = {
                        key: variantKey,
                        ...variant
                    };

                    console.log('选中游戏:', variant.name);
                };

                // 绑定事件
                gameOptions.forEach((option, index) => {
                    option.addEventListener('click', handleGameClick);
                    // 默认选中第一个
                    if (index === 0) {
                        option.click();
                    }
                });
            }

// 轮播图状态
let currentSlideIndex = 0;
let slideImages = [];
let touchStartX = 0;
let touchEndX = 0;
let lastTapTime = 0;
let autoPlayInterval = null; // 自动轮播定时器
const AUTO_PLAY_INTERVAL = 5000; // 5秒

function renderCarousel(product) {
    const wrapper = document.getElementById('carouselWrapper');
    if (!wrapper) return;

    wrapper.innerHTML = ''; // 清空旧内容
    currentSlideIndex = 0;
    slideImages = [];

    // --- 逻辑核心：决定使用哪些图片 ---
    // 优先查找 galleryFolder (轮播图专用)
    if (product.galleryFolder && product.galleryImages && product.galleryImages.length > 0) {
        // 拼接路径：文件夹 + 文件名
        slideImages = product.galleryImages.map(file => `${product.galleryFolder}/${file}`);
    } 
    // 后备方案：如果没有配置 gallery，则使用原来的 mainImage
    else {
        const defaultImg = product.mainImage || `/images/merch/${product.id}.jpg`;
        slideImages = [defaultImg];
    }

    // --- 构建 HTML ---
    const container = document.createElement('div');
    container.className = 'carousel-container';

    let slidesHtml = '';

    
    slideImages.forEach((src, index) => {
        const isActive = index === 0 ? 'active' : '';
        // 给第一张图加上 id="mainImage"，保证你原有的高度同步代码(syncPanelHeights)能找到它
        const idAttr = index === 0 ? 'id="mainImage"' : '';
        
        slidesHtml += `
            <div class="carousel-slide ${isActive}" data-index="${index}">
                <img src="${src}" ${idAttr} alt="Slide ${index}">
            </div>
        `;
    });

    // 只有当图片大于1张时，才显示导航按钮
    let controlsHtml = '';
    if (slideImages.length > 1) {
        controlsHtml = `
            <button class="carousel-btn prev-btn">❮</button>
            <button class="carousel-btn next-btn">❯</button>
            <div class="carousel-indicators">
                ${slideImages.map((_, idx) => 
                    `<div class="indicator ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>`
                ).join('')}
            </div>
        `;
    }

    container.innerHTML = slidesHtml + controlsHtml;
    wrapper.appendChild(container);

    // --- 绑定事件 ---
    if (slideImages.length > 1) {
        // 按钮点击
        container.querySelector('.prev-btn').addEventListener('click', () => moveSlide(-1));
        container.querySelector('.next-btn').addEventListener('click', () => moveSlide(1));
        
        // 指示点点击
        container.querySelectorAll('.indicator').forEach(dot => {
            dot.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.index);
                goToSlide(idx);
            });
        });
    }

    // --- 关键：触发图片加载后的高度同步 ---
    const mainImgEl = document.getElementById('mainImage');
    if (mainImgEl) {
        mainImgEl.onload = function() {
            // 调用你原有的同步高度函数
            if (typeof syncPanelHeights === 'function') {
                syncPanelHeights();
            }
        };
    }

    // 绑定触摸事件
setupTouchEvents(container);

// 绑定双击放大事件
setupDoubleClickZoom(container);
}

// 触摸滑动功能
function setupTouchEvents(container) {
    const slides = container.querySelectorAll('.carousel-slide');
    
    container.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    container.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, { passive: true });
}

function handleSwipe() {
    const swipeThreshold = 50; // 最小滑动距离
    const diff = touchStartX - touchEndX;

    if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
            // 向左滑动 - 下一张
            moveSlide(1);
        } else {
            // 向右滑动 - 上一张
            moveSlide(-1);
        }
    }
}

// 双击放大功能
function setupDoubleClickZoom(container) {
    const images = container.querySelectorAll('.carousel-slide img');
    const modal = document.getElementById('imageZoomModal');
    const zoomedImage = document.getElementById('zoomedImage');
   

    images.forEach(img => {
        // 桌面端：双击
        img.addEventListener('dblclick', () => {
            openZoomModal(img.src);
        });

        // 移动端：检测双击
        img.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            
            if (tapLength < 300 && tapLength > 0) {
                // 双击检测成功
                e.preventDefault();
                openZoomModal(img.src);
            }
            
            lastTapTime = currentTime;
        });
    });

    // 关闭按钮
 
    // 点击背景关闭
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeZoomModal();
        }
    });

    // ESC键关闭
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            closeZoomModal();
        }
    });
}

function openZoomModal(imageSrc) {
    const modal = document.getElementById('imageZoomModal');
    const zoomedImage = document.getElementById('zoomedImage');
    
    zoomedImage.src = imageSrc;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden'; // 防止背景滚动
}

function closeZoomModal() {
    const modal = document.getElementById('imageZoomModal');
    modal.classList.remove('active');
    document.body.style.overflow = ''; // 恢复滚动
}

// 切换逻辑
function moveSlide(step) {
    let newIndex = currentSlideIndex + step;
    if (newIndex >= slideImages.length) newIndex = 0;
    if (newIndex < 0) newIndex = slideImages.length - 1;
    goToSlide(newIndex);
}

function goToSlide(index) {
    const slides = document.querySelectorAll('.carousel-slide');
    const dots = document.querySelectorAll('.indicator');
    
    if (!slides.length) return;

    // 移除旧状态
    slides[currentSlideIndex].classList.remove('active');
    if (dots.length) dots[currentSlideIndex].classList.remove('active');

    // 更新索引
    currentSlideIndex = index;

    // 添加新状态
    slides[currentSlideIndex].classList.add('active');
    if (dots.length) dots[currentSlideIndex].classList.add('active');
}

async function handleAddToCart() {

        const originalText = addBtn.textContent;
        const originalBg = addBtn.style.backgroundColor || 'black';

        // 2. 立即给予视觉反馈 (Optimistic UI) - 0ms 延迟

        const priceNumber = parseFloat(product.price.replace(/[^0-9.]/g, ''));
        const selectedVariant = product.selectedVariant;
        const variantSuffix = selectedVariant ? `-${selectedVariant.key}` : '';
        
        const cartItemData = {
            // user_id 会在 CartManager 内部获取，这里主要传内容
            draftId: null, // 如果是 console

            // 传递额外信息给 CartManager 处理 (如果需要的话，或者保持原有的 payload 结构)
        };
        
        // 这里为了适配 cart-manager 的 addToCartWithBackend，我们需要传递 draftId 和 quantities
        // 如果是 Console 商品，我们可能需要特殊处理，或者让 CartManager 兼容
        // 假设 CartManager 已经兼容 console 的 ID 传参:
        
        const typeId = `console-${product.id}${variantSuffix}`;
        
        // 4. 调用 CartManager (它内部会立即更新徽章)
        if (window.CartManager) {
            // 传递数据进行后台处理

        setTimeout(() => {

        }, 2000);
    }

async function sendAddToCartRequest(product, typeId, price) {
        // 这是后台实际发送请求的逻辑
        const cartItemData = {
            type: typeId,
            quantity: 1,
            price: price,
            sizes: { 'default': 1 },
            item_data: {
                productId: product.id,
                productName: product.name,
                productImage: product.mainImage
            }
        };
        
        // 手动调用 API
        const API = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
        const token = window.authManager.getToken();
        
        await fetch(`${API}/api/cart/add`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ cartItemData })
        });
    }
